<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />

    <title>MealScout - Food Truck Finder & Parking Sourcing</title>
    <meta
      name="description"
      content="Find food trucks near you or discover verified places to park and serve. MealScout helps food trucks source locations and helps customers find trucks."
    />
    <meta
      name="keywords"
      content="food deals, restaurant deals, local food, promotions, discounts, dining deals, meal deals, nearby restaurants"
    />

    <meta
      property="og:title"
      content="MealScout - Food Truck Finder & Parking Sourcing"
    />
    <meta
      property="og:description"
      content="Find food trucks near you or discover verified places to park and serve. MealScout helps food trucks source locations and helps customers find trucks."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MealScout" />
    <meta property="og:image" content="/og-default.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="MealScout - Food Truck Finder & Parking Sourcing"
    />
    <meta
      name="twitter:description"
      content="Find food trucks near you or discover verified places to park and serve."
    />
    <meta name="twitter:image" content="/og-default.jpg" />

    <!-- Facebook Browser Optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ef4444" />
    <meta name="msapplication-navbutton-color" content="#ef4444" />
    <meta name="apple-mobile-web-app-title" content="MealScout" />

    <!-- Privacy Policy for Platform Compliance -->
    <link rel="privacy-policy" href="https://mealscout.us/privacy-policy" />
    <meta
      property="privacy-policy"
      content="https://mealscout.us/privacy-policy"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Organization Schema for LLMO & Google Search -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MealScout",
        "url": "https://mealscout.us",
        "logo": "https://mealscout.us/logo.png",
        "description": "Find food trucks near you or discover verified places to park and serve. MealScout helps food trucks source locations and helps customers find trucks.",
        "foundingDate": "2025",
        "sameAs": [
          "https://www.facebook.com/mealscout",
          "https://twitter.com/mealscout"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "info.mealscout@gmail.com",
          "contactType": "Customer Service"
        }
      }
    </script>

    <!-- WebSite Schema for Search Box -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MealScout",
        "url": "https://mealscout.us",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://mealscout.us/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
